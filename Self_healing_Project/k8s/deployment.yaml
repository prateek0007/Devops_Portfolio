apiVersion: apps/v1
kind: Deployment
metadata: 
  name: self-healing-app
spec: 
  replicas: 2
  selector: 
      matchLabels:
        app: self-healing-app
  template:
    metadata:
      labels:
        app: self-healing-app
    spec:
      containers:
        - name: app
          image: prateekmall/devops-app:v1
          ports:
          - containerPort: 8000

          livenessProbe:
            httpGet:
              path: /
              port: 8000
            initialDelaySeconds: 10

          readinessProbe:

